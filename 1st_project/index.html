<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f0f4f8;
      font-family: sans-serif;
    }
    .container {
      text-align: center;
      padding: 2rem 3rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }
    h1 {
      font-size: 3rem;
      color: #2d3748;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 1.1rem;
      color: #718096;
    }
    .weather-section {
      margin-top: 1.5rem;
    }
    .weather-title {
      font-size: 0.9rem;
      color: #a0aec0;
      margin-bottom: 0.8rem;
      letter-spacing: 0.05em;
    }
    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.5rem;
    }
    .forecast-day {
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 0.7rem 0.4rem;
      min-width: 72px;
    }
    .forecast-day.today {
      background: #ebf8ff;
      border-color: #90cdf4;
    }
    .day-label {
      font-size: 0.8rem;
      font-weight: bold;
      color: #4a5568;
      margin-bottom: 0.4rem;
    }
    .forecast-day.today .day-label {
      color: #2b6cb0;
    }
    .day-icon {
      font-size: 1.6rem;
      line-height: 1.2;
    }
    .day-desc {
      font-size: 0.7rem;
      color: #718096;
      margin: 0.3rem 0;
      min-height: 2em;
    }
    .day-temps {
      font-size: 0.82rem;
      margin: 0.3rem 0;
    }
    .temp-high {
      color: #e53e3e;
      font-weight: bold;
    }
    .temp-low {
      color: #3182ce;
    }
    .day-rain {
      font-size: 0.75rem;
      color: #4299e1;
      margin-top: 0.3rem;
    }
    .weather-loading {
      color: #a0aec0;
      font-size: 0.95rem;
      padding: 1.5rem 0;
    }
    .weather-error {
      color: #e53e3e;
      font-size: 0.9rem;
      padding: 1rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello World</h1>
    <p>첫 번째 웹페이지입니다.</p>

    <div class="weather-section" id="weather">
      <div class="weather-loading">날씨 정보를 불러오는 중...</div>
    </div>
  </div>

  <script>
    const weatherCodes = {
      0:  { label: '맑음', icon: '☀️' },
      1:  { label: '대체로 맑음', icon: '🌤️' },
      2:  { label: '구름 조금', icon: '⛅' },
      3:  { label: '흐림', icon: '☁️' },
      45: { label: '안개', icon: '🌫️' },
      48: { label: '안개', icon: '🌫️' },
      51: { label: '가벼운 이슬비', icon: '🌦️' },
      53: { label: '이슬비', icon: '🌦️' },
      55: { label: '강한 이슬비', icon: '🌧️' },
      61: { label: '가벼운 비', icon: '🌧️' },
      63: { label: '비', icon: '🌧️' },
      65: { label: '강한 비', icon: '🌧️' },
      71: { label: '가벼운 눈', icon: '🌨️' },
      73: { label: '눈', icon: '❄️' },
      75: { label: '강한 눈', icon: '❄️' },
      77: { label: '싸락눈', icon: '🌨️' },
      80: { label: '소나기', icon: '🌦️' },
      81: { label: '비/소나기', icon: '🌧️' },
      82: { label: '강한 소나기', icon: '⛈️' },
      85: { label: '눈 소나기', icon: '🌨️' },
      86: { label: '강한 눈 소나기', icon: '❄️' },
      95: { label: '뇌우', icon: '⛈️' },
      96: { label: '우박 동반 뇌우', icon: '⛈️' },
      99: { label: '강한 우박 뇌우', icon: '⛈️' },
    };

    const dayNames = ['일', '월', '화', '수', '목', '금', '토'];

    async function getWeather(lat, lon) {
      const weatherEl = document.getElementById('weather');
      try {
        const res = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
          `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max` +
          `&timezone=auto&forecast_days=7`
        );
        const data = await res.json();
        const daily = data.daily;
        const today = new Date().toISOString().slice(0, 10);

        let rows = '';
        for (let i = 0; i < 7; i++) {
          const date = new Date(daily.time[i]);
          const isToday = daily.time[i] === today;
          const dayLabel = isToday ? '오늘' : dayNames[date.getDay()] + '요일';
          const dateLabel = `${date.getMonth() + 1}/${date.getDate()}`;
          const w = weatherCodes[daily.weather_code[i]] || { label: '알 수 없음', icon: '🌡️' };
          const max = Math.round(daily.temperature_2m_max[i]);
          const min = Math.round(daily.temperature_2m_min[i]);
          const rain = daily.precipitation_probability_max[i];

          rows += `
            <div class="forecast-day ${isToday ? 'today' : ''}">
              <div class="day-label">${dayLabel}</div>
              <div style="font-size:0.7rem;color:#a0aec0;">${dateLabel}</div>
              <div class="day-icon">${w.icon}</div>
              <div class="day-desc">${w.label}</div>
              <div class="day-temps">
                <span class="temp-high">${max}°</span>
                <span style="color:#cbd5e0;margin:0 2px;">/</span>
                <span class="temp-low">${min}°</span>
              </div>
              <div class="day-rain">&#128166; ${rain}%</div>
            </div>
          `;
        }

        weatherEl.innerHTML = `
          <div class="weather-title">스페인 레온 · 주간 예보</div>
          <div class="forecast-grid">${rows}</div>
        `;
      } catch {
        weatherEl.innerHTML = '<div class="weather-error">날씨 정보를 불러올 수 없습니다.</div>';
      }
    }

    // 스페인 레온 지방 고정 좌표
    getWeather(42.5987, -5.5671);
  </script>
</body>
</html>
