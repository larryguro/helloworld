<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f0f4f8;
      font-family: sans-serif;
    }
    .container {
      text-align: center;
      padding: 2rem 3rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }
    h1 {
      font-size: 3rem;
      color: #2d3748;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 1.1rem;
      color: #718096;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello World</h1>
    <p>첫 번째 웹페이지입니다.</p>
  </div>
</body>
</html>
